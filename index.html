<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A highly accessible, responsive Single Page Application portfolio.">
    <title>Portfolio SPA</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="sticky-header">
        <nav aria-label="Main Navigation" class="container">
            <div class="logo">
                <a href="#" aria-label="Home">MyPortfolio</a>
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#data-container">Projects</a></li>
                <li><a href="#in-god-we-trust">In God We Trust</a></li>
            </ul>
            <button id="theme-toggle" aria-label="Toggle Dark/Light Mode" aria-pressed="false">
                <span class="icon" aria-hidden="true">🌓</span>
            </button>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero-section container">
            <h1>Welcome to My Creative Space</h1>
            <p>I build accessible, responsive, and high-performance web applications.</p>
            <a href="#data-container" class="btn-primary" role="button">View My Work</a>
        </section>

        <section id="data-container" class="container" aria-label="Portfolio Projects">
            <!-- Dynamic content will be injected here -->
        </section>
    </main>

    <script src="js/app.js" type="module"></script>
</body>
</html>
