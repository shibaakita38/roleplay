<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic SPA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">My Portfolio</div>
            <ul class="nav-links">
                <li><a href="#hero">Home</a></li>
                <li><a href="#projects">Projects</a></li>
            </ul>
            <button id="theme-toggle" aria-label="Toggle Dark Mode">Toggle Theme</button>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero">
            <div class="hero-content">
                <h1>Welcome to My Dynamic Portfolio</h1>
                <p>Building responsive and interactive web experiences.</p>
                <a href="#projects" class="cta-button">View Projects</a>
            </div>
        </section>

        <section id="projects" class="projects-section">
            <h2>My Projects</h2>
            <div id="projects-container" class="projects-container">
                <!-- Projects will be injected here dynamically by app.js -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 My Portfolio. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
