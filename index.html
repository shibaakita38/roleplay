<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A high-quality, fully responsive, and accessible Single Page Application portfolio.">
    <meta name="keywords" content="portfolio, SPA, accessible, web development, web design">
    <meta name="author" content="Your Name">
    <title>Portfolio SPA</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Defer the script so it loads after HTML parsing -->
    <script src="js/app.js" defer></script>
</head>
<body>
    <header class="site-header" role="banner">
        <div class="header-container">
            <div class="logo">
                <a href="/" aria-label="Home page">My Portfolio</a>
            </div>
            <nav class="main-nav" aria-label="Main Navigation">
                <ul>
                    <li><a href="#hero">Home</a></li>
                    <li><a href="#data-container">Projects</a></li>
                </ul>
            </nav>
            <button id="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false" class="theme-toggle">
                <span class="theme-icon light-icon" aria-hidden="true">☀️</span>
                <span class="theme-icon dark-icon" aria-hidden="true">🌙</span>
            </button>
        </div>
    </header>

    <main id="main-content" role="main">
        <section id="hero" class="hero" aria-labelledby="hero-title">
            <div class="hero-content">
                <h1 id="hero-title">Welcome to My Portfolio</h1>
                <p class="subtitle">Building high-quality, fully responsive, and accessible web experiences.</p>
                <button class="cta-button" aria-label="View my projects">View My Work</button>
            </div>
        </section>

        <section id="data-container" class="data-container" aria-labelledby="projects-title">
            <div class="section-header">
                <h2 id="projects-title">My Projects</h2>
            </div>
            <div class="grid-container" id="projects-grid" role="list">
                <!-- Dynamic content will be injected here via JavaScript -->
            </div>
        </section>
    </main>

    <footer role="contentinfo" class="site-footer">
        <p>&copy; <span id="current-year"></span> Portfolio SPA. All rights reserved.</p>
    </footer>
</body>
</html>
